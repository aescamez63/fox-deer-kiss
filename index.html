<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TE QUIERO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0e8;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  #phrase-bar {
    margin-top: 18px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.32em;
    color: #b89070;
    min-height: 40px;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  #hint {
    margin-top: 8px;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: #ccc0b0;
    font-weight: 300;
  }
  #final-msg {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    text-align: center;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.8s, transform 0.8s cubic-bezier(0.34,1.56,0.64,1);
  }
  #final-msg.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  #final-msg .big {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: #9a7060;
    text-transform: uppercase;
  }
  #final-msg .small {
    margin-top: 10px;
    font-size: clamp(13px, 2vw, 18px);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #c4a890;
  }
  /* Mobile touch buttons */
  #mobile-controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    z-index: 10;
    gap: 8px;
    flex-direction: column;
    align-items: center;
  }
  #mobile-controls .row { display: flex; gap: 8px; }
  .btn-move {
    width: 52px; height: 52px;
    background: rgba(180,150,120,0.22);
    border: 1px solid rgba(180,150,120,0.35);
    border-radius: 12px;
    color: #b89070;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
  }
  @media (max-width: 700px) {
    #mobile-controls { display: flex; }
    #hint { display: none; }
  }
</style>
</head>
<body>

<div id="ui">
  <div id="phrase-bar"></div>
  <div id="hint">WASD · flechas · o toca los controles</div>
</div>

<div id="final-msg">
  <div class="big">happy 18 months</div>
  <div class="small">♡</div>
</div>

<div id="mobile-controls">
  <div class="row">
    <div class="btn-move" id="btn-up">↑</div>
  </div>
  <div class="row">
    <div class="btn-move" id="btn-left">←</div>
    <div class="btn-move" id="btn-down">↓</div>
    <div class="btn-move" id="btn-right">→</div>
  </div>
</div>

<canvas id="c"></canvas>

<script>
// ─── SETUP ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  scale = Math.min(W, H) / 600;
}
resize();
window.addEventListener('resize', () => { resize(); generateTrees(); });

// ─── STATE MACHINE ────────────────────────────────────────────────────────────
// States: 'playing' | 'cutscene' | 'kiss' | 'celebrate'
let state = 'playing';

// ─── INPUT ────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

// Mobile buttons
['btn-up','btn-left','btn-down','btn-right'].forEach(id => {
  const el = document.getElementById(id);
  const map = { 'btn-up': 'ArrowUp', 'btn-left': 'ArrowLeft', 'btn-down': 'ArrowDown', 'btn-right': 'ArrowRight' };
  el.addEventListener('pointerdown', e => { keys[map[id]] = true; e.preventDefault(); });
  el.addEventListener('pointerup',   e => { keys[map[id]] = false; });
  el.addEventListener('pointerleave',e => { keys[map[id]] = false; });
});

// ─── FOX PLAYER ───────────────────────────────────────────────────────────────
const fox = {
  x: 0, y: 0,     // set after resize
  vx: 0, vy: 0,
  speed: 2.4,
  facingRight: true,
  walkFrame: 0,
  walkTimer: 0,
  // auto-move in cutscene
  autoMove: false,
  autoTargetX: 0,
  autoTargetY: 0,
};

// ─── DEER (appears after phrase complete) ─────────────────────────────────────
const deer = {
  x: 0, y: 0,
  visible: false,
  walkFrame: 0,
  walkTimer: 0,
  facingRight: false,
  autoMove: false,
  autoTargetX: 0,
  autoTargetY: 0,
};

// ─── PHRASE & LETTERS ─────────────────────────────────────────────────────────
const PHRASE = ['T','E','Q','U','I','E','R','O'];
let collected = [];        // letters collected so far
let currentLetter = null;  // the floating letter on screen
let phraseComplete = false;

// ─── PARTICLES & EFFECTS ──────────────────────────────────────────────────────
let hearts = [];        // floating heart particles
let letterAnims = [];   // collect-burst animations
let floatParticles = []; // ambient background particles

// ─── TREES ────────────────────────────────────────────────────────────────────
let trees = [];

function generateTrees() {
  trees = [];
  const count = Math.floor(W / 90) + 4;
  for (let i = 0; i < count; i++) {
    trees.push({
      x: Math.random() * W,
      y: H * 0.25 + Math.random() * H * 0.15,
      r: 18 + Math.random() * 22,
      trunkH: 22 + Math.random() * 16,
      shade: Math.random() * 0.12,
    });
  }
  // Sort by y so closer trees render on top
  trees.sort((a, b) => a.y - b.y);
}

// ─── GROUND BANDS ─────────────────────────────────────────────────────────────
const GROUND_Y_FRAC = 0.72; // fraction of H where ground line sits

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  fox.x = W * 0.18;
  fox.y = H * GROUND_Y_FRAC - 10;
  deer.x = W * 0.82;
  deer.y = H * GROUND_Y_FRAC - 10;
  generateTrees();
  spawnAmbientParticles();
  spawnNextLetter();
}

// ─── AMBIENT PARTICLES ────────────────────────────────────────────────────────
function spawnAmbientParticles() {
  floatParticles = [];
  for (let i = 0; i < 18; i++) {
    floatParticles.push(makeAmbientParticle(true));
  }
}

function makeAmbientParticle(randomY) {
  return {
    x: Math.random() * W,
    y: randomY ? Math.random() * H : H + 10,
    size: 2 + Math.random() * 3,
    speed: 0.18 + Math.random() * 0.25,
    drift: (Math.random() - 0.5) * 0.15,
    opacity: 0.12 + Math.random() * 0.18,
  };
}

// ─── LETTER SPAWNING ──────────────────────────────────────────────────────────
function spawnNextLetter() {
  if (collected.length >= PHRASE.length) return;
  const char = PHRASE[collected.length];
  // keep letters in the playable area, avoid top UI and bottom controls
  const margin = 80 * scale;
  const lx = margin + Math.random() * (W - margin * 2);
  const ly = H * 0.38 + Math.random() * (H * 0.35);
  currentLetter = {
    char,
    x: lx,
    y: ly,
    bobOffset: Math.random() * Math.PI * 2,
    scale: 0,  // animate in
    collected: false,
  };
}

// ─── COLLECT LETTER ───────────────────────────────────────────────────────────
function collectLetter() {
  if (!currentLetter || currentLetter.collected) return;
  currentLetter.collected = true;
  collected.push(currentLetter.char);

  // burst particles
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.4;
    letterAnims.push({
      x: currentLetter.x,
      y: currentLetter.y,
      vx: Math.cos(angle) * (1.5 + Math.random() * 2),
      vy: Math.sin(angle) * (1.5 + Math.random() * 2) - 1,
      life: 1,
      size: 4 + Math.random() * 3,
      type: 'spark',
    });
  }
  // small heart pop
  for (let i = 0; i < 3; i++) {
    spawnHeart(currentLetter.x + (Math.random()-0.5)*30, currentLetter.y - 10, true);
  }

  // Update phrase bar
  updatePhraseBar();

  // Check completion
  if (collected.length === PHRASE.length) {
    setTimeout(startCutscene, 600);
    phraseComplete = true;
  } else {
    setTimeout(spawnNextLetter, 400);
  }
  currentLetter = null;
}

function updatePhraseBar() {
  const bar = document.getElementById('phrase-bar');
  bar.textContent = collected.join(' ');
}

// ─── HEARTS ───────────────────────────────────────────────────────────────────
function spawnHeart(x, y, small) {
  hearts.push({
    x, y,
    vx: (Math.random() - 0.5) * 1.2,
    vy: -(0.6 + Math.random() * 1.0),
    life: 1,
    size: small ? (6 + Math.random() * 6) : (12 + Math.random() * 14),
    drift: (Math.random() - 0.5) * 0.15,
  });
}

function spawnCelebrationHearts() {
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      hearts.push({
        x: Math.random() * W,
        y: -20,
        vx: (Math.random() - 0.5) * 0.8,
        vy: 0.4 + Math.random() * 0.9,
        life: 1,
        size: 8 + Math.random() * 16,
        drift: (Math.random() - 0.5) * 0.2,
        falling: true,
      });
    }, i * 120);
  }
}

// ─── CUTSCENE ────────────────────────────────────────────────────────────────
let cutscenePhase = 0; // 0=fox walks, 1=pause+look, 2=kiss, 3=celebrate
let cutsceneTimer = 0;
const KISS_DIST = 54 * scale;

function startCutscene() {
  state = 'cutscene';
  cutscenePhase = 0;
  cutsceneTimer = 0;
  deer.visible = true;
  deer.x = W * 0.82;
  deer.y = H * GROUND_Y_FRAC - 10;
  deer.facingRight = false;

  // Fox walks right toward deer
  const meetX = (fox.x + deer.x) / 2;
  const meetY = H * GROUND_Y_FRAC - 10;
  fox.autoMove = true;
  fox.autoTargetX = meetX - KISS_DIST * 0.5;
  fox.autoTargetY = meetY;
  deer.autoMove = true;
  deer.autoTargetX = meetX + KISS_DIST * 0.5;
  deer.autoTargetY = meetY;
}

// ─── DRAWING HELPERS ──────────────────────────────────────────────────────────

// Draw heart shape
function drawHeartShape(cx, cy, size, alpha, color) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color || '#c0a0a0';
  ctx.beginPath();
  ctx.moveTo(cx, cy + size * 0.3);
  ctx.bezierCurveTo(cx, cy, cx - size * 0.7, cy, cx - size * 0.7, cy + size * 0.45);
  ctx.bezierCurveTo(cx - size * 0.7, cy + size * 0.85, cx, cy + size * 1.15, cx, cy + size * 1.35);
  ctx.bezierCurveTo(cx, cy + size * 1.15, cx + size * 0.7, cy + size * 0.85, cx + size * 0.7, cy + size * 0.45);
  ctx.bezierCurveTo(cx + size * 0.7, cy, cx, cy, cx, cy + size * 0.3);
  ctx.fill();
  ctx.restore();
}

// Draw eye with look direction
function drawEye(cx, cy, angle, r, closed) {
  ctx.save();
  if (closed) {
    // closed eye (for kiss)
    ctx.strokeStyle = '#3a2a1a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI, 0, false);
    ctx.stroke();
  } else {
    ctx.fillStyle = '#3a2a1a';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    const px = cx + Math.cos(angle) * r * 0.5;
    const py = cy + Math.sin(angle) * r * 0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px, py, r * 0.38, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ─── DRAW FOX ─────────────────────────────────────────────────────────────────
// cx, cy = center-bottom of character (feet level)
// facingRight: bool
// walkFrame: 0 or 1 (leg animation)
// eyeTarget: {x,y} or null for kiss (closed eyes)
// kissMode: bool
function drawFox(cx, cy, facingRight, walkFrame, eyeTarget, kissMode) {
  ctx.save();
  if (!facingRight) {
    ctx.scale(-1, 1);
    cx = -cx;
  }

  const s = scale * 0.88; // size multiplier
  const bx = cx;          // body center x
  const by = cy - 22 * s; // body center y (legs hang below cy)

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.fillStyle = '#8a6040';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 4*s, 22*s, 5*s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Tail
  ctx.fillStyle = '#d4855a';
  ctx.beginPath();
  ctx.moveTo(bx - 18*s, by + 4*s);
  ctx.bezierCurveTo(bx - 52*s, by - 8*s, bx - 58*s, by + 30*s, bx - 32*s, by + 32*s);
  ctx.bezierCurveTo(bx - 18*s, by + 33*s, bx - 15*s, by + 22*s, bx - 18*s, by + 4*s);
  ctx.fill();
  ctx.fillStyle = '#f5e0cc';
  ctx.beginPath();
  ctx.ellipse(bx - 37*s, by + 28*s, 8*s, 6*s, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Legs (animated)
  const legSwing = walkFrame === 1 ? 3*s : 0;
  ctx.fillStyle = '#d4855a';
  // back legs
  ctx.beginPath(); ctx.roundRect(bx - 10*s, by + 16*s + legSwing, 7*s, 16*s, 3*s); ctx.fill();
  ctx.beginPath(); ctx.roundRect(bx + 4*s, by + 16*s - legSwing, 7*s, 16*s, 3*s); ctx.fill();
  // paws
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath(); ctx.ellipse(bx - 6*s, by + 32*s + legSwing, 5*s, 2.5*s, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + 7*s, by + 32*s - legSwing, 5*s, 2.5*s, 0, 0, Math.PI * 2); ctx.fill();

  // Body
  ctx.fillStyle = '#d4855a';
  ctx.beginPath();
  ctx.ellipse(bx, by + 10*s, 28*s, 20*s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#f5e0cc';
  ctx.beginPath();
  ctx.ellipse(bx + 4*s, by + 16*s, 16*s, 12*s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head center
  const hx = bx + 16*s;
  const hy = by - 2*s;

  // Ears drawn BEFORE head so the head ellipse covers their bases
  ctx.fillStyle = '#d4855a';
  ctx.beginPath();
  ctx.moveTo(hx - 2*s,  hy - 4*s);
  ctx.lineTo(hx - 8*s,  hy - 28*s);
  ctx.lineTo(hx + 10*s, hy - 6*s);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#e8a585';
  ctx.beginPath();
  ctx.moveTo(hx - 1*s,  hy - 6*s);
  ctx.lineTo(hx - 6*s,  hy - 22*s);
  ctx.lineTo(hx + 8*s,  hy - 7*s);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#d4855a';
  ctx.beginPath();
  ctx.moveTo(hx + 10*s, hy - 4*s);
  ctx.lineTo(hx + 16*s, hy - 28*s);
  ctx.lineTo(hx + 22*s, hy - 4*s);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#e8a585';
  ctx.beginPath();
  ctx.moveTo(hx + 11*s, hy - 6*s);
  ctx.lineTo(hx + 16*s, hy - 22*s);
  ctx.lineTo(hx + 20*s, hy - 6*s);
  ctx.closePath();
  ctx.fill();

  // Head drawn ON TOP of ear bases
  ctx.fillStyle = '#d4855a';
  ctx.beginPath();
  ctx.ellipse(hx, hy, 20*s, 18*s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Muzzle
  ctx.fillStyle = '#f5e0cc';
  ctx.beginPath();
  ctx.ellipse(hx + 14*s, hy + 8*s, 9*s, 7*s, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath();
  ctx.ellipse(hx + 17*s, hy + 9*s, 3*s, 2.2*s, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  const eyeX = hx + 8*s;
  const eyeY = hy - 2*s;
  if (kissMode) {
    drawEye(eyeX, eyeY, 0, 4*s, true);
  } else {
    let ang;
    if (eyeTarget) {
      const tx = facingRight ? eyeTarget.x : (W - eyeTarget.x);
      ang = Math.atan2(eyeTarget.y - (cy - 60*s), tx - (cx + (facingRight?1:-1)*16*s));
    } else {
      ang = facingRight ? 0 : Math.PI;
    }
    drawEye(eyeX, eyeY, ang, 4*s, false);
  }

  ctx.restore();
}

// ─── DRAW DEER ────────────────────────────────────────────────────────────────
function drawDeer(cx, cy, facingRight, walkFrame, eyeTarget, kissMode) {
  ctx.save();
  if (!facingRight) {
    ctx.scale(-1, 1);
    cx = -cx;
  }

  const s = scale * 0.88;
  const bx = cx;
  const by = cy - 22*s;

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.fillStyle = '#8a6040';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 4*s, 22*s, 5*s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // White tail
  ctx.fillStyle = '#f5f0eb';
  ctx.beginPath();
  ctx.ellipse(bx + 26*s, by + 10*s, 7*s, 9*s, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  const legSwing = walkFrame === 1 ? 3*s : 0;
  ctx.fillStyle = '#c8966e';
  ctx.beginPath(); ctx.roundRect(bx - 10*s, by + 16*s + legSwing, 7*s, 16*s, 3*s); ctx.fill();
  ctx.beginPath(); ctx.roundRect(bx + 4*s, by + 16*s - legSwing, 7*s, 16*s, 3*s); ctx.fill();
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath(); ctx.ellipse(bx - 6*s, by + 32*s + legSwing, 5*s, 2.5*s, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + 7*s, by + 32*s - legSwing, 5*s, 2.5*s, 0, 0, Math.PI * 2); ctx.fill();

  // Body
  ctx.fillStyle = '#c8966e';
  ctx.beginPath();
  ctx.ellipse(bx, by + 10*s, 28*s, 20*s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#f0dcc8';
  ctx.beginPath();
  ctx.ellipse(bx - 4*s, by + 16*s, 16*s, 12*s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head center
  const hx = bx - 16*s;
  const hy = by - 2*s;

  // Ears drawn BEFORE head so the head ellipse covers their bases
  // Right ear (top, pointing up)
  ctx.fillStyle = '#c8966e';
  ctx.beginPath();
  ctx.moveTo(hx - 2*s,  hy - 4*s);
  ctx.lineTo(hx - 4*s,  hy - 28*s);
  ctx.lineTo(hx - 16*s, hy - 6*s);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#e8c4a4';
  ctx.beginPath();
  ctx.moveTo(hx - 3*s,  hy - 6*s);
  ctx.lineTo(hx - 5*s,  hy - 22*s);
  ctx.lineTo(hx - 13*s, hy - 7*s);
  ctx.closePath();
  ctx.fill();

  // Left ear (side, pointing outward)
  ctx.fillStyle = '#c8966e';
  ctx.beginPath();
  ctx.moveTo(hx - 10*s, hy - 4*s);
  ctx.lineTo(hx - 28*s, hy - 18*s);
  ctx.lineTo(hx - 16*s, hy - 6*s);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#e8c4a4';
  ctx.beginPath();
  ctx.moveTo(hx - 11*s, hy - 5*s);
  ctx.lineTo(hx - 23*s, hy - 16*s);
  ctx.lineTo(hx - 15*s, hy - 7*s);
  ctx.closePath();
  ctx.fill();

  // Head drawn ON TOP of ear bases
  ctx.fillStyle = '#c8966e';
  ctx.beginPath();
  ctx.ellipse(hx, hy, 19*s, 17*s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Antlers
  ctx.strokeStyle = '#8a6040';
  ctx.lineWidth = 2.5*s;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(hx - 8*s, hy - 12*s); ctx.lineTo(hx - 14*s, hy - 34*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx - 12*s, hy - 26*s); ctx.lineTo(hx - 26*s, hy - 32*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx - 12*s, hy - 26*s); ctx.lineTo(hx - 8*s, hy - 40*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx + 4*s, hy - 14*s); ctx.lineTo(hx + 6*s, hy - 36*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx + 5*s, hy - 28*s); ctx.lineTo(hx + 18*s, hy - 34*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx + 5*s, hy - 28*s); ctx.lineTo(hx + 2*s, hy - 42*s); ctx.stroke();

  // Snout
  ctx.fillStyle = '#f0dcc8';
  ctx.beginPath();
  ctx.ellipse(hx - 14*s, hy + 8*s, 8*s, 6.5*s, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath();
  ctx.ellipse(hx - 17*s, hy + 9*s, 2.8*s, 2*s, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  const eyeX = hx - 6*s;
  const eyeY = hy - 2*s;
  if (kissMode) {
    drawEye(eyeX, eyeY, 0, 4*s, true);
  } else {
    let ang;
    if (eyeTarget) {
      const tx = facingRight ? eyeTarget.x : (W - eyeTarget.x);
      ang = Math.atan2(eyeTarget.y - (cy - 60*s), tx - (cx + (facingRight?1:-1)*(-16*s)));
    } else {
      ang = facingRight ? 0 : Math.PI;
    }
    drawEye(eyeX, eyeY, ang, 4*s, false);
  }

  ctx.restore();
}

// ─── DRAW TREE ────────────────────────────────────────────────────────────────
function drawTree(x, y, r, trunkH, shade) {
  ctx.save();
  // trunk
  ctx.fillStyle = `rgba(160,130,100,${0.55 + shade})`;
  ctx.beginPath();
  ctx.roundRect(x - 4, y - trunkH, 8, trunkH, 2);
  ctx.fill();
  // foliage (two circles for depth)
  ctx.fillStyle = `rgba(195,185,165,${0.28 + shade * 0.5})`;
  ctx.beginPath();
  ctx.arc(x, y - trunkH - r * 0.6, r * 0.75, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgba(185,175,155,${0.38 + shade * 0.5})`;
  ctx.beginPath();
  ctx.arc(x, y - trunkH - r * 0.9, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ─── DRAW BACKGROUND ─────────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient (soft beige to warm white)
  const sky = ctx.createLinearGradient(0, 0, 0, H * GROUND_Y_FRAC);
  sky.addColorStop(0, '#ede8e0');
  sky.addColorStop(1, '#f5f0e8');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * GROUND_Y_FRAC);

  // Ground
  const grd = ctx.createLinearGradient(0, H * GROUND_Y_FRAC, 0, H);
  grd.addColorStop(0, '#e8e2d8');
  grd.addColorStop(1, '#ddd8ce');
  ctx.fillStyle = grd;
  ctx.fillRect(0, H * GROUND_Y_FRAC, W, H * (1 - GROUND_Y_FRAC));

  // Ground line (soft)
  ctx.save();
  ctx.strokeStyle = 'rgba(180,165,148,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, H * GROUND_Y_FRAC);
  ctx.lineTo(W, H * GROUND_Y_FRAC);
  ctx.stroke();
  ctx.restore();

  // Distant hills (very subtle)
  ctx.save();
  ctx.fillStyle = 'rgba(210,200,188,0.25)';
  ctx.beginPath();
  ctx.ellipse(W * 0.25, H * GROUND_Y_FRAC + 5, W * 0.28, 60, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = 'rgba(205,195,183,0.22)';
  ctx.beginPath();
  ctx.ellipse(W * 0.72, H * GROUND_Y_FRAC + 5, W * 0.32, 55, 0, Math.PI, 0);
  ctx.fill();
  ctx.restore();
}

// ─── DRAW FLOATING LETTER ─────────────────────────────────────────────────────
function drawLetter(t) {
  if (!currentLetter) return;
  const bob = Math.sin(t * 0.002 + currentLetter.bobOffset) * 6;
  const s = currentLetter.scale;
  const lx = currentLetter.x;
  const ly = currentLetter.y + bob;

  ctx.save();
  ctx.translate(lx, ly);
  ctx.scale(s, s);

  // Soft glow halo
  ctx.save();
  ctx.globalAlpha = 0.18 * s;
  ctx.fillStyle = '#d4a880';
  ctx.beginPath();
  ctx.arc(0, 0, 28 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Letter
  const fontSize = Math.round(34 * scale);
  ctx.font = `300 ${fontSize}px 'Helvetica Neue', Helvetica, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#b8906a';
  ctx.globalAlpha = 0.92;
  ctx.fillText(currentLetter.char, 0, 0);
  ctx.restore();
}

// ─── DRAW PHRASE BAR (canvas overlay for kiss celebration) ────────────────────
function drawCelebrationPhrase(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `300 ${Math.round(18 * scale)}px 'Helvetica Neue', Helvetica, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#b8906a';
  ctx.letterSpacing = '0.3em';
  ctx.fillText('T E Q U I E R O', W / 2, H * 0.88);
  ctx.restore();
}

// ─── MOUSE TRACKER (for eye direction) ────────────────────────────────────────
let mousePos = { x: W / 2, y: H / 2 };
window.addEventListener('mousemove', e => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
window.addEventListener('touchmove', e => {
  mousePos.x = e.touches[0].clientX;
  mousePos.y = e.touches[0].clientY;
}, { passive: true });

// ─── UPDATE ───────────────────────────────────────────────────────────────────
let kissTimer = 0;
let kissAnimating = false;
let celebrateAlpha = 0;

function update(dt) {
  // ─── AMBIENT PARTICLES
  for (let p of floatParticles) {
    p.y -= p.speed;
    p.x += p.drift;
    if (p.y < -10) { Object.assign(p, makeAmbientParticle(false)); }
  }

  // ─── HEARTS
  for (let h of hearts) {
    if (h.falling) {
      h.y += h.vy;
      h.x += h.vx;
      if (h.y > H + 20) h.life = 0;
    } else {
      h.y += h.vy;
      h.x += h.vx + h.drift;
      h.vy -= 0.012;
      h.life -= 0.008;
    }
  }
  hearts = hearts.filter(h => h.life > 0);

  // ─── LETTER BURST SPARKS
  for (let a of letterAnims) {
    a.x += a.vx;
    a.y += a.vy;
    a.vy += 0.04;
    a.life -= 0.035;
  }
  letterAnims = letterAnims.filter(a => a.life > 0);

  // ─── LETTER SCALE IN
  if (currentLetter && currentLetter.scale < 1) {
    currentLetter.scale = Math.min(1, currentLetter.scale + 0.05);
  }

  if (state === 'playing') {
    // ─── FOX MOVEMENT
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
    if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;

    if (dx !== 0 || dy !== 0) {
      const len = Math.sqrt(dx*dx + dy*dy);
      fox.vx = (dx / len) * fox.speed;
      fox.vy = (dy / len) * fox.speed * 0.6; // constrain vertical
      if (dx > 0) fox.facingRight = true;
      if (dx < 0) fox.facingRight = false;
    } else {
      fox.vx *= 0.75;
      fox.vy *= 0.75;
    }

    fox.x += fox.vx;
    fox.y += fox.vy;

    // Bounds
    const margin = 30;
    fox.x = Math.max(margin, Math.min(W - margin, fox.x));
    fox.y = Math.max(H * 0.35, Math.min(H * GROUND_Y_FRAC, fox.y));

    // Walk animation
    if (Math.abs(fox.vx) > 0.2 || Math.abs(fox.vy) > 0.1) {
      fox.walkTimer += dt;
      if (fox.walkTimer > 200) { fox.walkFrame = 1 - fox.walkFrame; fox.walkTimer = 0; }
    } else { fox.walkFrame = 0; }

    // ─── COLLECT LETTER
    if (currentLetter && !currentLetter.collected) {
      const ldx = fox.x - currentLetter.x;
      const ldy = fox.y - currentLetter.y - 10;
      if (Math.sqrt(ldx*ldx + ldy*ldy) < 32 * scale) {
        collectLetter();
      }
    }
  }

  if (state === 'cutscene') {
    // Fox auto-walks
    const fDist = Math.sqrt((fox.autoTargetX - fox.x)**2 + (fox.autoTargetY - fox.y)**2);
    if (fDist > 2) {
      const spd = Math.min(fDist * 0.04, 2.2);
      fox.vx = (fox.autoTargetX - fox.x) / fDist * spd;
      fox.vy = (fox.autoTargetY - fox.y) / fDist * spd * 0.6;
      fox.x += fox.vx;
      fox.y += fox.vy;
      fox.facingRight = fox.vx > 0;
      fox.walkTimer += dt;
      if (fox.walkTimer > 200) { fox.walkFrame = 1 - fox.walkFrame; fox.walkTimer = 0; }
    } else {
      fox.vx = 0; fox.vy = 0; fox.walkFrame = 0;
    }

    // Deer auto-walks toward fox
    const dDist = Math.sqrt((deer.autoTargetX - deer.x)**2 + (deer.autoTargetY - deer.y)**2);
    if (dDist > 2) {
      const spd = Math.min(dDist * 0.04, 2.2);
      deer.vx = (deer.autoTargetX - deer.x) / dDist * spd;
      deer.vy = (deer.autoTargetY - deer.y) / dDist * spd * 0.6;
      deer.x += deer.vx;
      deer.y += deer.vy;
      deer.facingRight = deer.vx > 0;
      deer.walkTimer += dt;
      if (deer.walkTimer > 200) { deer.walkFrame = 1 - deer.walkFrame; deer.walkTimer = 0; }
    } else {
      deer.vx = 0; deer.vy = 0; deer.walkFrame = 0;
    }

    // Check if both close enough for kiss
    const kissDist = Math.abs(fox.x - deer.x);
    if (kissDist < KISS_DIST * 1.8 && fDist < 4 && dDist < 4) {
      state = 'kiss';
      kissTimer = 0;
      fox.autoMove = false;
      deer.autoMove = false;
      // Face each other
      fox.facingRight = fox.x < deer.x;
      deer.facingRight = deer.x < fox.x;
    }
  }

  if (state === 'kiss') {
    kissTimer += dt;
    if (kissTimer > 600 && !kissAnimating) {
      kissAnimating = true;
      // spawn hearts
      for (let i = 0; i < 6; i++) {
        setTimeout(() => {
          spawnHeart((fox.x + deer.x) / 2 + (Math.random()-0.5)*40, fox.y - 60*scale, false);
        }, i * 180);
      }
      setTimeout(() => {
        state = 'celebrate';
        spawnCelebrationHearts();
        setTimeout(() => {
          document.getElementById('final-msg').classList.add('show');
        }, 1200);
      }, 2200);
    }
  }

  if (state === 'celebrate') {
    celebrateAlpha = Math.min(1, celebrateAlpha + 0.008);
    // Keep spawning hearts slowly
    if (Math.random() < 0.03) {
      spawnHeart(Math.random() * W, Math.random() * H * 0.5, false);
    }
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(t) {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  // Ambient particles (dust/pollen)
  for (let p of floatParticles) {
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = '#c8b8a0';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Trees (behind characters)
  const groundY = H * GROUND_Y_FRAC;
  for (let tr of trees) {
    if (tr.y < groundY - 10) drawTree(tr.x, tr.y, tr.r, tr.trunkH, tr.shade);
  }

  // ─── LETTER BURST SPARKS
  for (let a of letterAnims) {
    ctx.save();
    ctx.globalAlpha = a.life * 0.8;
    ctx.fillStyle = '#c4956a';
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.size * a.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ─── HEARTS
  for (let h of hearts) {
    const alpha = h.falling ? Math.min(h.life, 0.55) : h.life * 0.75;
    drawHeartShape(h.x, h.y, h.size, alpha, '#c0a0a0');
  }

  // ─── FLOATING LETTER
  drawLetter(t);

  // ─── DEER (behind / in front based on y)
  if (deer.visible) {
    const dEyeTarget = state === 'playing' ? mousePos :
                       (state === 'kiss' || state === 'celebrate') ? null : mousePos;
    const dKiss = (state === 'kiss' || state === 'celebrate') && kissTimer > 400;
    drawDeer(deer.x, deer.y, deer.facingRight, deer.walkFrame, dEyeTarget, dKiss);
  }

  // ─── FOX
  const fKiss = (state === 'kiss' || state === 'celebrate') && kissTimer > 400;
  drawFox(fox.x, fox.y, fox.facingRight, fox.walkFrame, state === 'playing' ? mousePos : null, fKiss);

  // Kiss sparkle (between them)
  if (state === 'kiss' && kissTimer > 600) {
    const kAlpha = Math.min(1, (kissTimer - 600) / 400);
    ctx.save();
    ctx.globalAlpha = kAlpha * 0.7;
    ctx.font = `${Math.round(22 * scale)}px serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#c09898';
    ctx.fillText('♡', (fox.x + deer.x) / 2, fox.y - 68 * scale);
    ctx.restore();
  }

  // Celebration fade overlay
  if (state === 'celebrate' && celebrateAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = celebrateAlpha * 0.12;
    ctx.fillStyle = '#f0d8c0';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(t) {
  const dt = t - lastTime;
  lastTime = t;
  update(dt);
  render(t);
  requestAnimationFrame(loop);
}

// ─── START ────────────────────────────────────────────────────────────────────
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
